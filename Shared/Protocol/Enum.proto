syntax = "proto3";
package Protocol;

import "google/protobuf/descriptor.proto";

// =====================================================================
// [경고] eRole을 추가하거나 수정했다면, 
// 반드시 PacketGenerator 솔루션을 열어서 '재빌드(Rebuild)' 하세요!
// (제너레이터의 C# 코드에서 이 Enum을 직접 파싱해서 사용하기 때문입니다.)
// =====================================================================
enum eRole 
{
    ROLE_NONE = 0;
    CLIENT = 1;
    GAME_SERVER = 2;
}

extend google.protobuf.MessageOptions 
{
    eRole sender = 50000;
    eRole receiver = 50001;
}
