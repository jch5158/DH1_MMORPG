syntax = "proto3";
package Protocol;

import "Enum.proto";

message C2S_LOGIN_REQ
{
    option (sender) = CLIENT;
    option (receiver) = GAME_SERVER;

	uint64 id = 1;
	uint32 hp = 2;
	uint32 attack = 3;
	uint32 test = 4;
}

message S2C_LOGIN_RES
{
    option (sender) = GAME_SERVER;
    option (receiver) = CLIENT;

	bool result = 1;
}